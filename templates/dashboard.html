<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Dashboard</title>
</head>
<body>
{% extends "base.html" %}
{% block content%}
<p><h2>Welcome {{user.username}} !!! </h2>  <a href="/logout" class="btn btn-primary mb-3">Logout</a></p>
<form method="POST" action="/add" class="mb-4">
  <input type="text" name="name" placeholder="Student Name"
         class="form-control mb-2" required>
  <input type="text" name="course" placeholder="Course"
         class="form-control mb-2" required >
  <button class="btn btn-success">Add Student</button>
</form>

<table class = "table table-bordered">
       <thead>
       <tr>
         <th>ID</th>
         <th>Name</th>
         <th>Course</th>
         <th>Actions</th>
       </tr>
       </thead>
{% for student in students %}
<tr>
  <td>{{student.id}}</td>
  <td>{{student.name}}</td>
  <td>{{student.course}}</td>
  <td>
    <a href="/edit/{{student.id}}" class="btn btn-warning btn-sm">Edit</a>
    <a href="/delete/{{student.id}}" class="btn btn-danger btn-sm">Delete</a>
  </td>
</tr>
{% endfor %}
</table>
{% endblock %}
</body>
</html>
