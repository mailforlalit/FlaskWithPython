<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Student Data</title>
</head>
<body>
{% extends "base.html" %}
{% block content %}

<h2>Update Student</h2>
<form method="POST" action="/update/{{student.id}}">
  <input type="text" id="name" name="name" value="{{student.name}}" placeholder="Student Name"
         class="form-control mb-2" required>
  <input type="text" id="course" name="course" value="{{student.course}}" placeholder="Course"
         class="form-control mb-2" required >
  <button class="btn btn-primary">Update Student</button>
</form>
<a href="/dashboard" class="btn btn-link mt-3">Back to Dashboard</a>

{% endblock %}
</body>
</html>
